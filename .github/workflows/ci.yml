name: CI/CD Pipeline - Code Quality & Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pytest httpx fastapi uvicorn
        if [ -f ml_service/requirements.txt ]; then pip install -r ml_service/requirements.txt; fi

    - name: Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 ml_service/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings for now.
        flake8 ml_service/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Format Check with Black
      run: |
        black --check ml_service/

    - name: Run Pytest API Suite
      env:
        S2S_API_KEY: s2s_ci_cd_test_key
      run: |
        PYTHONPATH=ml_service pytest ml_service/tests/
